<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App</title>

    <style>
        body {
            background-color: black;
            color: white;
        }

        .label-text1 {
            font-size: 2rem;
            color: #ffffff;
        }

        .center-toggle {
            text-align: center;
        }

        .label-text2 {
            color: #ffffff;
            font-size: 2rem;
        }

        .switch {
            font-size: 17px;
            position: relative;
            display: inline-block;
            width: 3.5em;
            height: 2em;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            border: 2px solid #414141;
            border-radius: 50px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 1.4em;
            width: 1.4em;
            left: 0.2em;
            bottom: 0.2em;
            background-color: rgb(19, 164, 201);
            border-radius: inherit;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.320, 1);
        }

        .switch input:checked+.slider {
            box-shadow: 0 0 20px rgba(9, 117, 241, 0.8);
            border: 2px solid #0974f1;
        }

        .switch input:checked+.slider:before {
            transform: translateX(1.5em);
        }

        .split {
            height: 100%;
            width: 50%;
            position: fixed;
            z-index: 1;
            top: 0;
            overflow-x: hidden;
            padding-top: 20px;
            color: white;
        }

        .left {
            top: 73px;
            left: 0;
            background-color: rgb(0, 0, 0);
            color: white;
        }

        .right {
            right: 0;
        }

        .centered {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: flex;
            align-content: center;
            justify-content: center;
        }

        .centered2 {
            position: absolute;
            top: 58%;
            left: 50%;
            transform: translate(-50%, -50%);

        }

        .button-center {
            text-align: center;
            margin-top: 20px;
        }

        header {
            padding: 14px;
            color: #fff;
        }

        header h1 {
            margin: 0;
        }

        header.online {
            background-color: #3b82f6;
        }

        header.offline {
            background-color: #3b82f6;
        }

        .vl {
            border-left: 6px solid rgb(226, 226, 226);
            height: 500px;
            position: absolute;
            left: 50%;
            margin-left: -3px;
            top: 100px;
        }

        #fileInput {
            font-size: 1.5rem;
        }

        #submitButton {
            font-size: 1.5rem;
        }

        button {
            font-family: monospace;
            background-color: #f3f7fe;
            color: #3b82f6;
            border: none;
            border-radius: 8px;
            width: 100px;
            height: 45px;
            transition: .3s;
        }

        #submitButton {
            background-color: #3b82f6;
            box-shadow: 0 0 0 5px #3b83f65f;
            color: #fff;
        }

        #submitButton:hover {
            background-color: #bbbbbb;
            box-shadow: 0 0 0 5px #3b83f65f;
            color: #fff;
        }

        button:hover {
            background-color: #3b82f6;
            box-shadow: 0 0 0 5px #3b83f65f;
            color: #fff;
        }

        button:disabled {
            background-color: #bbbbbb;
            box-shadow: 0 0 0 5px #3b83f65f;
            color: #fff;
        }

        .dropdown {
            font-size: 20px;

            color: white;
        }

        #cars {
            font-size: 20px;

        }
        .error-text {
            font-size: 14px;
            color: red;
            margin-top: 0;
        }
    </style>
</head>

<body>
    <header id="appHeader" class="offline">
        <h1>Spectrum Analyzer</h1>
    </header>

    <div class="split left">
        <div class="centered">
            <span class="label-text1" id="offline">Offline</span> &nbsp;&nbsp;
            <span class="cente-swit">
                <label class="switch">
                    <input id="switch" type="checkbox" onchange="toggleRightSection()">
                    <span class="slider"></span>
                </label>
            </span>&nbsp;&nbsp;
            <span class="label-text2" id="online">Online</span>
        </div>
    </div>
    <div class="vl"></div>

    <div class="split right" id="rightSection">

        <div class="centered2">
            <form method="post" action="/analyze" enctype="multipart/form-data">
                <input type="file" accept=".mat, .npy, .bin" name="fileInput" id="fileInput" disabled>
                <br>
                <div class="button-center">
                    <button id="submitButton" disabled> <a>Submit</a>
                    </button>
                </div>
            </form>
        </div>
    </div>
    <div id="errorText" style="display: none;top:18%;color: rgb(0, 0, 0);right: 200px;
    position: absolute;">
       <form action="" id="form">

        <!-- Add 'required' attribute to enforce selection -->
        <div class="dropdown">
            <label for="platform">Platform</label>&nbsp;&nbsp;&nbsp;
            <select name="platform" id="platform" required>
                <option value="" disabled selected>Select a platform</option>
                <option value="volvo">AM273X-2243</option>
                <option value="saab">AWR294X</option>
            </select>
            <br><br>

            <label for="sdkVersion">SDK Version</label>&nbsp;&nbsp;&nbsp;
            <select name="sdkVersion" id="sdkVersion" required>
                <option value="" disabled selected>Select an SDK version</option>
                <option value="v1">4.1</option>
                <option value="v2">4.2</option>
                <option value="v3">4.3</option>
                <option value="v4">4.4</option>
            </select>
            <br><br>
                <!-- Add 'required' attribute to enforce selection -->
                <label for="antannaConfig">Antenna Config</label>&nbsp;&nbsp;&nbsp;
                <select name="antannaConfig" id="antannaConfig" required>
                    <option value="" disabled selected>Select an antenna config</option>
                    <option value="a1">4Rx,4Tx</option>
                    <option value="a2">4Rx,3Tx</option>
                    <option value="a3">4Rx,3Tx</option>
                </select>
                <div id="antannaConfigError" class="error-text"></div> <!-- Error message for the SDK Version select field -->

                <br>
                <!-- Add 'required' attribute to enforce selection -->
                <label for="processingChain">Processing Chain</label>&nbsp;&nbsp;&nbsp;
                <select name="processingChain" id="processingChain" required>
                    <option value="" disabled selected>Select a processing chain</option>
                    <option value="a1">TDM</option>
                    <option value="a2">DDM</option>
                </select>
                <div id="processingChainError" class="error-text"></div> <!-- Error message for the SDK Version select field -->

                <br>
                <!-- Add 'required' attribute to enforce selection -->
                <label for="desirableConfig">Desirable Configuration</label>&nbsp;&nbsp;&nbsp;
                <select name="desirableConfig" id="desirableConfig" required>
                    <option value="" disabled selected>Select a desirable configuration</option>
                    <option value="a1">Best Range</option>
                    <option value="a2">Best Velocity</option>
                </select>
                <div id="desirableConfigError" class="error-text"></div> <!-- Error message for the SDK Version select field -->

                <br>
                <!-- Add 'required' attribute to enforce selection -->
                <label for="frequencyBand">Frequency Band</label>&nbsp;&nbsp;&nbsp;
                <select name="frequencyBand" id="frequencyBand" required>
                    <option value="" disabled selected>Select a frequency band</option>
                    <option value="a1">77 - 81 GHz</option>
                    <option value="a2">76 - 77 GHz</option>
                </select>
                <div id="frequencyBandError" class="error-text"></div> <!-- Error message for the SDK Version select field -->

                <br>
                <!-- Add 'required' attribute to enforce selection -->
                <label for="sensorPort">Sensor Port</label>&nbsp;&nbsp;&nbsp;
                <select name="sensorPort" id="sensorPort" required>
                    <option disabled value="" disabled selected>Select a sensor port</option>
                    <option disabled value="p1">Port 1</option>
                    <option disabled value="p2">Port 2</option>
                    <option disabled value="p3">Port 3</option>
                </select>
                <div id="sensorPortError" class="error-text"></div> <!-- Error message for the SDK Version select field -->

                <br>
                <!-- Add 'required' attribute to enforce selection -->
                <label for="cameraPort">Camera Port</label>&nbsp;&nbsp;&nbsp;
                <select name="cameraPort" id="cameraPort" required>
                    <option disabled value="" disabled selected>Select a camera port</option>
                    <option disabled value="p1">Port 1</option>
                    <option disabled value="p2">Port 2</option>
                    <option disabled value="p3">Port 3</option>
                </select>
                <div id="cameraPortError" class="error-text"></div> <!-- Error message for the SDK Version select field -->

            </div>
            <br>
            <button onclick="validateForm()" style="text-align: center;">Submit</button>
        </form>
    </div>

    <script>
        function toggleRightSection() {
            const rightSection = document.getElementById("rightSection");
            const switchToggle = document.getElementById("switch");
            const fileInput = document.getElementById("fileInput");
            const submitButton = document.getElementById("submitButton");
            const errorText = document.getElementById("errorText");
            // const dropDown = document.getElementById("rightDrop")

            if (switchToggle.checked) {
                rightSection.style.display = "none";
                fileInput.setAttribute("disabled", "disabled");
                submitButton.setAttribute("disabled", "disabled");
                errorText.style.display = "block";
                // dropDown.style.display="block"


            } else {

                rightSection.style.display = "block";
                fileInput.removeAttribute("disabled");
                fileInput.addEventListener("change", function () {
                    if (fileInput.value) {
                        submitButton.removeAttribute("disabled");
                    } else {
                        submitButton.setAttribute("disabled", "disabled");
                    }
                });
                errorText.style.display = "none";
            }
        }

        function goToNextPage() {
            window.location.href = "app.html";
        }
        const fileInput = document.getElementById('fileInput');
        const submitButton = document.getElementById("submitButton");
        submitButton.addEventListener("click", function () {
            goToNextPage();
        });
        function validateForm() {
            var platform = document.getElementById("platform").value;
            var sdkVersion = document.getElementById("sdkVersion").value;
            var antannaConfig = document.getElementById("antannaConfig").value;
            var processingChain = document.getElementById("processingChain").value;
            var desirableConfig = document.getElementById("desirableConfig").value;
            var frequencyBand = document.getElementById("frequencyBand").value;
            var sensorPort = document.getElementById("sensorPort").value;
            var cameraPort = document.getElementById("cameraPort").value;

            // Perform validation checks for each field
            clearError("platform");
            clearError("sdkVersion");
            clearError("antannaConfig");
            clearError("processingChain");
            clearError("desirableConfig");
            clearError("frequencyBand");
            clearError("sensorPort");
            clearError("cameraPort");
            // Clear other error messages as needed...

         
            // Get values for other fields as needed...

            // Perform validation checks for each field
            if (platform === "") {
                showError("platform", "Please select a platform.");
                return;
            }

            if (sdkVersion === "") {
                showError("sdkVersion", "Please select an SDK version.");
                return;
            }
            if (sdkVersion === "") {
                showError("sdkVersion", "Please select an SDK version.");
                return;
            }
            if (sdkVersion === "") {
                showError("sdkVersion", "Please select an SDK version.");
                return;
            }
            if (sdkVersion === "") {
                showError("sdkVersion", "Please select an SDK version.");
                return;
            }
            if (sdkVersion === "") {
                showError("sdkVersion", "Please select an SDK version.");
                return;
            }
            if (sdkVersion === "") {
                showError("sdkVersion", "Please select an SDK version.");
                return;
            }
            if (sdkVersion === "") {
                showError("sdkVersion", "Please select an SDK version.");
                return;
            }
            

        
        }
      
        function showError(fieldId, message) {
            var errorDiv = document.getElementById(fieldId + "Error");
            errorDiv.textContent = message;
            errorDiv.style.color = "red"; // Add this line to set the error text color to red
        }

        function clearError(fieldId) {
            var errorDiv = document.getElementById(fieldId + "Error");
            errorDiv.textContent = "";
        }
    </script>
</body>

</html>
