<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AppHA</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: black;
      color: white;
      overflow: hidden;
    }

    header {
      position: absolute;
      top: 7px;
      left: 0;
      width: 100%;
      padding: 14px;
      color: #fff;
      background-color: #3b82f6;
    }

    header h1 {
      margin: 0;
    }

    #container {
      text-align: center;
      margin-top: 50px;
    }

    #chartContainer {
      position: relative;
    }

    #chartButtons {
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }

    button {
      font-family: monospace;
      background-color: #f3f7fe;
      color: #3b82f6;
      border: none;
      border-radius: 8px;
      width: 100px;
      height: 45px;
      font-size: 15px;
      font-weight: 1rem;
      transition: .3s;
    }

    button:hover {
      font-weight: 1rem;

      background-color: #3b82f6;
      box-shadow: 0 0 0 5px #3b83f65f;
      color: #fff;
    }
  </style>
</head>

<body>
  <header id="appHeader" class="offline">
    <h1>Spectrum Analyzer</h1>
  </header>

  <div id="container">
    <h1>{{inputtext}}</h1>
    <!-- <div>
            
            <input type="number" id="inputValue">
        </div> -->

    <div id="chartContainer">
      <canvas id="circleChart"></canvas>

      <div id="chartButtons">
        <form action="/">
          <button onclick="startChart()">Start Over</button>&nbsp;&nbsp;&nbsp;&nbsp;
        </form>
        <button onclick="updateChart()">Accuracy</button>&nbsp;&nbsp;&nbsp;&nbsp;
        <button onclick="cancelChart()">Exit</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script>
    var chartInstance = null;

    function updateChart() {
      var value = parseFloat({{ inputValue }});
    var ctx = document.getElementById("circleChart").getContext("2d");
    var percentage = value + '%';

    var data = {
      labels: [percentage],
      datasets: [{
        data: [value, 100 - value],
        backgroundColor: [
          'rgba(255, 99, 132, 0.5)',
          'rgba(54, 162, 235, 0.5)',
        ],
        borderColor: [
          'rgba(255, 99, 132, 1)',
          'rgba(54, 162, 235, 1)',
        ],
        borderWidth: 0,
        borderRadius: 7,
      }]
    };

    var options = {
      animation: {
        duration: 1000,
        easing: 'easeOutQuart'
      },
      cutoutPercentage: 70,
      elements: {
        arc: {
          borderWidth: 0,
        }
      }
    };

    if (chartInstance !== null) {
      chartInstance.destroy();
    }

    chartInstance = new Chart(ctx, {
      type: 'doughnut',
      data: data,
      options: options
    });
        }
    function startChart() {
      window.href('index.html')
    }
    function cancelChart() {
      window.close();
    }
  </script>
</body>

</html>
